services:

  localstack:
    # We need to pin the tag to 4.4.0 because after that version LocalStack has become a paid service for commercial use.
    image: localstack/localstack:4.4.0
    ports:
      - '4566-4597:4566-4597'
      - "8000:5000"
    restart: unless-stopped
    environment:
      - SERVICES=sns,sqs,iam,s3,cloudwatch
      - DEBUG=1
      - EDGE_PORT=4566
      - DISABLE_CORS_CHECKS=1

  # Add service health dependencies to ServiceControl instances
  servicecontrol:
    depends_on:
      localstack:
        condition: service_healthy
  servicecontrol-audit:
    depends_on:
      localstack:
        condition: service_healthy
  servicecontrol-monitoring:
    depends_on:
      localstack:
        condition: service_healthy